name: Daily Lark Beauty Bot

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download Code
      run: |
        wget https://raw.githubusercontent.com/xutong0301-a11y/lark-beauty-bot/main/bot.py
        wget https://raw.githubusercontent.com/xutong0301-a11y/lark-beauty-bot/main/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
      run: python bot.py
